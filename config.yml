baseURL: "https://evan0571.github.io/"
languageCode: "zh-cn"
title: "EvanSong's Blog"
theme: "PaperMod"

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

markup:
  goldmark:
    parser:
      wrapStandAloneImageWithinParagraph: false
    renderer:
      unsafe: true

params:
  env: production
  title: "EvanSong's Blog"
  description: "Quiet notes on code, tools, and learning"
  author: "Evan0571"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  comments: true
  giscus:
    enabled: true
    repo: "Evan0571/Evan0571.github.io"
    repoId: "R_kgDORbXAOA"
    category: "Announcements"
    categoryId: "DIC_kwDORbXAOM4C3cdd"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "top"
    lang: "zh-CN"
    theme: "preferred_color_scheme"
  landing:
    tagline: "\"Knowing yourself is the beginning of all wisdom\" -- Aristotle"
    focus: "Improving backend fundamentals and writing sharper engineering notes each week."
    github: "https://github.com/Evan0571"
    intro:
      - "I'm Evan, a CS student focused on practical engineering, backend systems, and developer tooling."
      - "This site is used to share my ideas, notes and experiences."
    avatar: ""
    avatarAlt: "Evan profile"
    cta:
      - label: "Read Posts"
        url: "/posts/"
      - label: "Open Notes"
        url: "https://evan0571.github.io/notes/"
      - label: "View Projects"
        url: "#projects"
    projects:
      - title: "Campus Helper Bot"
        description: "A workflow assistant that answers common campus questions and routes requests."
        tags: ["TypeScript", "Supabase", "Telegram Bot API"]
        url: "#"
      - title: "Speech Summary Pipeline"
        description: "Upload audio, transcribe asynchronously, then generate concise multilingual summaries."
        tags: ["Node.js", "Queue", "Serverless"]
        url: "#"
      - title: "Personal Analytics Dashboard"
        description: "A private dashboard for weekly goals, habit trends, and writing consistency."
        tags: ["React", "PostgreSQL", "Charts"]
        url: "#"
      - title: "Markdown Knowledge Base"
        description: "A searchable note system with structured docs and lightweight publishing flow."
        tags: ["MkDocs", "GitHub Actions", "Material"]
        url: "#"

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 25
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 40
    - identifier: notes
      name: Notes
      url: https://evan0571.github.io/notes/
      weight: 50
    - identifier: links
      name: Links
      url: /links/
      weight: 60

outputs:
  home:
    - HTML
    - RSS
    - JSON
