{{- $summary := "" -}}

{{- $plain := .Plain | htmlUnescape | replaceRE "\\s+" " " | chomp -}}
{{- if gt (len $plain) 0 -}}
  {{- $summary = $plain | truncate 96 -}}
{{- else if .Description -}}
  {{- $summary = .Description | plainify | htmlUnescape | chomp -}}
{{- end -}}

{{- return $summary -}}
