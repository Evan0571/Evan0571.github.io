{{- $items := split (replace .Inner "\r\n" "\n") "\n" -}}
<div class="travel-gallery{{ with .Get "class" }} {{ . }}{{ end }}">
  {{- range $items -}}
    {{- $item := trim . " \r\n\t" -}}
    {{- if $item -}}
      <div class="travel-gallery-item">
        {{- $item | markdownify -}}
      </div>
    {{- end -}}
  {{- end -}}
</div>
